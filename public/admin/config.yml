# Decap CMS 配置
# 管理后台访问地址：你的域名/admin/

backend:
  name: github
  repo: znjznb/front-new
  branch: main
  auth_type: pkce
  app_id: Ov23ct4DBS9aoHy03EUX
  # 使用 PKCE 授权码流，无需额外后端服务器

# 图片上传路径
media_folder: public/assets
public_folder: /assets

# 语言
locale: zh_Hans

collections:
  - name: news
    label: 新闻
    label_singular: 新闻
    folder: src/content/news
    create: true
    delete: true
    format: frontmatter
    slug: "{{slug}}"
    preview_path: news/{{slug}}/
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 摘要, name: summary, widget: text, hint: "首页新闻卡片上显示的一两句话，建议不超过100字" }
      - { label: 正文, name: body, widget: markdown, hint: "新闻详情页的完整内容，支持多段落" }

  - name: products
    label: 产品
    label_singular: 产品
    folder: src/content/products
    create: true
    delete: true
    format: json
    slug: "{{slug}}"
    fields:
      - { label: 产品名称, name: name, widget: string }
      - { label: 产品线, name: line, widget: string, hint: '例：专业线 · Expert Collection' }
      - { label: 描述, name: desc, widget: text }
      - { label: 图片路径, name: image, widget: string, hint: '图片在 public/assets/ 目录，填写如 /assets/product-xxx.jpg' }
      - { label: 排序, name: order, widget: number, value_type: int, hint: "数字越小越靠前" }
